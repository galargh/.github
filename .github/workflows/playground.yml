name: Playground

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    types: [opened, synchronize, labeled]
  release:
    types:
      - published
      - released

permissions:
  checks: write

defaults:
  run:
    shell: bash

env:
  ABC: 123

jobs:
  playground:
    if: github.event.action != 'labeled' || github.event.label.name == 'label'
    concurrency:
      group: abc
      cancel-in-progress: true
    uses: ./.github/workflows/playground2.yml
