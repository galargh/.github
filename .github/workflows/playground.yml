name: Playground

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      count:
        type: number
        default: 0
  pull_request:
  push:
    paths: ['.github/workflows/playground.yml', '**/*.yml']
  release:
    types:
      - published
      - released

permissions:
  checks: write

defaults:
  run:
    shell: bash

env:
  ABC: 123

jobs:
  playground:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - run: |
          git show HEAD
      - run: | 
          git show HEAD~1
      - run: |
          git diff HEAD~1
      - run: |
          git log
      - run: |
           echo "$GITHUB_BASE_REF"
      - run: |
           git show "$GITHUB_BASE_REF"
