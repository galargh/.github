name: Playground

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
  push:
    paths: ['.github/workflows/playground.yml', '**/*.yml']
  release:
    types:
      - published
      - released

permissions:
  checks: write

defaults:
  run:
    shell: bash

env:
  ABC: 123

jobs:
  playground:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: a
            environment: 1
          - service: b
            environment: 2
        exclude:
          - service: a
    steps:
      - run: echo "Hello, World!"
