name: Playground

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      count:
        type: number
        default: 0
  pull_request:
  push:
    paths: ['.github/workflows/playground.yml', '**/*.yml']
  release:
    types:
      - published
      - released

permissions:
  checks: write

defaults:
  run:
    shell: bash

env:
  ABC: 123

jobs:
  playground:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - run: |
          EXPECTED=$((1 + ${{ github.event.pull_request.commits || 1 }}))
          AVAILABLE=$(git rev-list --count HEAD)
          echo "Expected commits: $EXPECTED, available commits: $AVAILABLE"
          if [ "$AVAILABLE" -lt "$EXPECTED" ]; then
            DEPTH=$((EXPECTED - AVAILABLE))
            git fetch origin "$GITHUB_REF" --deepen="$DEPTH" --no-tags --no-recurse-submodules
          fi
      - if: ${{ github.event_name == 'pull_request' }}
        run: |
          git log HEAD^1..HEAD^2 --oneline
      - if: ${{ github.event_name != 'pull_request' }}
        run: |
          git log HEAD~1..HEAD --oneline
