name: Playground

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      count:
        type: number
        default: 0
  pull_request:
  push:
    paths: ['.github/workflows/playground.yml', '**/*.yml']
  release:
    types:
      - published
      - released

permissions:
  checks: write

defaults:
  run:
    shell: bash

env:
  ABC: 123

jobs:
  playground:
    runs-on: ubuntu-latest
    concurrency:
      group: playground
      cancel-in-progress: true
    steps:
      - run: sleep 60

  result:
    needs: [playground]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && !failure() }}
    steps:
      - run: echo "${{ needs.playground.result }}"
    
      
