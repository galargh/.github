name: Playground

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
  push:
    paths: ['.github/workflows/playground.yml', '**/*.yml']
  release:
    types:
      - published
      - released

permissions:
  checks: write

defaults:
  run:
    shell: bash

env:
  ABC: 123

jobs:
  playground:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - bigquery-server
          - livekit-agent
          - xi-backend-server
          - xi-frontend-nextjs
          - xi-frontend-nginx
        environment:
          - ci
          - dev
          - prod
        exclude:
          - environment: ${{ 'dev' == 'dev' && 'prod' || '' }}
          - environment: ${{ 'dev' == 'prod' && 'dev' || '' }}
    steps:
      - run: echo "Hello, World!"
