name: Playground

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      count:
        type: number
        default: 0
  pull_request:
  push:
    paths: ['.github/workflows/playground.yml', '**/*.yml']
  release:
    types:
      - published
      - released

permissions:
  checks: write

defaults:
  run:
    shell: bash

env:
  ABC: 123

jobs:
  playground:
    uses: ./.github/workflows/playground.yml@43b24e70a382cc76ae98835413bf61e749ccee1e
